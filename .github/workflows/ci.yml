name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t flask-candidate-api .

    - name: Run Container
      run: |
        docker run -d -p 5000:5000 flask-candidate-api
        sleep 5

    - name: Install dependencies
      run: pip install requests

    - name: Run Tests
      run: python3 test_app.py
